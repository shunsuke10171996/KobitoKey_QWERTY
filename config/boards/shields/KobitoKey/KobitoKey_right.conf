CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_MOUSE=y


CONFIG_SPI=y
CONFIG_INPUT=y


CONFIG_PMW3610=y
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_REPORT_INTERVAL_MIN=12

# ドライバ標準の低電力（スリープ）モードへの移行を無効化する
CONFIG_PMW3610_DOWNSHIFT_TIME_REST=0
CONFIG_PMW3610_DOWNSHIFT_TIME_RUN=0


CONFIG_ZMK_BATTERY_REPORTING=y
